# Vercel への自動デプロイは Vercel ダッシュボードで GitHub 連携済みのため、
# このワークフローはビルド確認のみ行います。
# 実際のデプロイは Vercel が push を検知して自動実行します。

name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
